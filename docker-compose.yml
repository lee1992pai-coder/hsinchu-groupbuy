version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: groupbuy
      POSTGRES_USER: gbuser
      POSTGRES_PASSWORD: gbpass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gbuser:gbpass@postgres:5432/groupbuy
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      ECPAY_MERCHANT_ID: ""
      ECPAY_HASH_KEY: ""
      ECPAY_HASH_IV: ""
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://gbuser:gbpass@postgres:5432/groupbuy
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://gbuser:gbpass@postgres:5432/groupbuy
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend-consumer:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-consumer:/app

  frontend-merchant:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5174:5174"
    volumes:
      - ./frontend-merchant:/app

  frontend-admin:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5175:5175"
    volumes:
      - ./frontend-admin:/app

volumes:
  pg_data:
